name: Release Pipeline

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      installer_script_changed: ${{ steps.filter.outputs.installer_script }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            installer_script:
              - 'scripts/install-latest-release.sh'

  release:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[release]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build release artifacts
        run: pnpm release:prepare

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          ZIP_PATH="release-artifacts/manclaw-release-v${VERSION}.zip"
          INSTALL_SCRIPT="scripts/install-latest-release.sh"

          if [[ ! -f "${ZIP_PATH}" ]]; then
            echo "Expected release artifact not found: ${ZIP_PATH}" >&2
            exit 1
          fi

          if [[ ! -f "${INSTALL_SCRIPT}" ]]; then
            echo "Expected installer script not found: ${INSTALL_SCRIPT}" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "zip_path=${ZIP_PATH}" >> "${GITHUB_OUTPUT}"
          echo "install_script=${INSTALL_SCRIPT}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: manclaw-release-${{ steps.meta.outputs.version }}
          path: |
            ${{ steps.meta.outputs.zip_path }}
            ${{ steps.meta.outputs.install_script }}

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Move version tag to current commit
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          git tag -d "${TAG}" 2>/dev/null || true
          git push origin ":refs/tags/${TAG}" || true
          git tag -fa "${TAG}" -m "Release ${TAG}"
          git push origin "refs/tags/${TAG}" --force

      - name: Publish GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          artifacts: ${{ steps.meta.outputs.zip_path }},${{ steps.meta.outputs.install_script }}
          artifactErrorsFailBuild: true
          allowUpdates: true
          replacesArtifacts: true
          generateReleaseNotes: true

  scripts_release:
    needs: changes
    if: needs.changes.outputs.installer_script_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify installer script exists
        run: test -f scripts/install-latest-release.sh

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Move scripts tag to current commit
        shell: bash
        run: |
          TAG="scripts"
          git tag -d "${TAG}" 2>/dev/null || true
          git push origin ":refs/tags/${TAG}" || true
          git tag -fa "${TAG}" -m "Installer script ${TAG}"
          git push origin "refs/tags/${TAG}" --force

      - name: Publish scripts pre-release
        uses: ncipollo/release-action@v1
        with:
          tag: scripts
          name: scripts
          artifacts: scripts/install-latest-release.sh
          artifactErrorsFailBuild: true
          allowUpdates: true
          replacesArtifacts: true
          prerelease: true
          makeLatest: false
