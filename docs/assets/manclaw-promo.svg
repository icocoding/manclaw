  <g opacity="0.97">
    <text x="86" y="338" fill="#83DEFF" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="22" font-weight="700" letter-spacing="6">OPENCLAW OPERATOR CONSOLE</text>
    <text x="86" y="446" fill="#F4FBFF" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="112" font-weight="800">ManClaw</text>
    <text x="86" y="510" fill="#FF7B87" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="34" font-weight="700">Command Your Claw.</text>
    <text x="86" y="596" fill="#C7E7F8" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="32" font-weight="600">Built to give OpenClaw operators one place to see state,</text>
    <text x="86" y="640" fill="#C7E7F8" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="32" font-weight="600">govern configuration, and steer capabilities safely.</text>
    <text x="86" y="724" fill="#6EBDE6" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="24">目标不是再造一个聊天入口，而是提供一个更清晰、更可控的 OpenClaw 操作面。</text>
  </g>

  <g opacity="0.86">
    <rect x="86" y="752" width="184" height="46" rx="23" fill="#0D1828" stroke="#2A557B"/>
    <text x="120" y="782" fill="#9DE8FF" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="22" font-weight="700">Live Control</text>
    <rect x="290" y="752" width="202" height="46" rx="23" fill="#0D1828" stroke="#2A557B"/>
    <text x="324" y="782" fill="#9DE8FF" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="22" font-weight="700">Config Safety</text>
    <rect x="512" y="752" width="198" height="46" rx="23" fill="#0D1828" stroke="#2A557B"/>
    <text x="546" y="782" fill="#9DE8FF" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="22" font-weight="700">Skill Ops</text>
  </g>

  <g filter="url(#shadow-soft)">
    <rect x="914" y="108" width="614" height="690" rx="32" fill="url(#panel-shell)" stroke="url(#panel-stroke)" stroke-width="2"/>

    <rect x="942" y="136" width="558" height="156" rx="24" fill="#0B1625"/>
    <rect x="942" y="136" width="558" height="156" rx="24" stroke="#1B3552"/>
    <circle cx="1018" cy="224" r="15" fill="#3ED09A"/>
    <rect x="978" y="172" width="170" height="10" rx="5" fill="#163049"/>
    <rect x="1170" y="172" width="72" height="10" rx="5" fill="#163049"/>
    <text x="1060" y="202" fill="#F2FAFF" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="23" font-weight="700">See state, change safely,</text>
    <text x="1060" y="232" fill="#F2FAFF" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="23" font-weight="700">and act from one operator surface</text>
    <text x="1060" y="262" fill="#9FC8E3" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="17">Focused on management goals:</text>
    <text x="1060" y="286" fill="#9FC8E3" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="17">visibility, safe edits, and capability control.</text>

    <rect x="942" y="324" width="254" height="176" rx="24" fill="#0B1625" stroke="#17324D"/>
    <rect x="1246" y="324" width="254" height="176" rx="24" fill="#0B1625" stroke="#17324D"/>
    <rect x="942" y="520" width="254" height="176" rx="24" fill="#0B1625" stroke="#17324D"/>
    <rect x="1246" y="520" width="254" height="176" rx="24" fill="#0B1625" stroke="#17324D"/>

    <rect x="986" y="336" width="96" height="12" rx="6" fill="url(#accent-blue)"/>
    <text x="986" y="384" fill="#F1FAFF" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="27" font-weight="700">Service Control</text>
    <text x="986" y="420" fill="#8FB7D4" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="18">Start, stop, restart,</text>
    <text x="986" y="446" fill="#8FB7D4" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="18">fix, and inspect runtime state.</text>

    <rect x="1258" y="336" width="96" height="12" rx="6" fill="url(#accent-red)"/>
    <text x="1258" y="384" fill="#F1FAFF" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="27" font-weight="700">Agent Ops</text>
    <text x="1258" y="420" fill="#8FB7D4" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="18">Manage models, bindings,</text>
    <text x="1258" y="446" fill="#8FB7D4" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="18">tools, sessions, and roles.</text>

    <rect x="986" y="528" width="96" height="12" rx="6" fill="url(#accent-blue)"/>
    <text x="986" y="576" fill="#F1FAFF" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="27" font-weight="700">Channel Wiring</text>
    <text x="986" y="612" fill="#8FB7D4" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="18">Connect channels to</text>
    <text x="986" y="638" fill="#8FB7D4" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="18">the right agent behaviors.</text>

    <rect x="1258" y="528" width="96" height="12" rx="6" fill="url(#accent-red)"/>
    <text x="1258" y="576" fill="#F1FAFF" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="27" font-weight="700">Plugin + Skill Ops</text>
    <text x="1258" y="612" fill="#8FB7D4" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="18">Install, review, disable,</text>
    <text x="1258" y="638" fill="#8FB7D4" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="18">and keep capabilities tidy.</text>

    <rect x="942" y="718" width="558" height="56" rx="18" fill="#0A1320" stroke="#17314B"/>
    <text x="990" y="724" fill="#A5EAFF" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="21" font-weight="700">A clearer control surface</text>
    <text x="990" y="748" fill="#A5EAFF" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="21" font-weight="700">for real OpenClaw environments</text>
  </g>
